name: Build Multi-Platform Artifacts

on:
  push:
    branches: [dev/flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
      - name: Ensure iOS platform
        run: |
          if [ ! -d ios ]; then
            flutter create --platforms=ios --project-name erate --org com.example .
          fi
      - run: flutter pub get
      - name: CocoaPods install
        working-directory: ios
        run: |
          pod repo update
          pod install
      - run: flutter build ios --release --no-codesign
      - name: Package Runner.app
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 2 -name 'Runner.app' -type d | head -n1)
          echo "app: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry erate-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: erate-ios-unsigned.ipa

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -qry ../../../../../erate-macos.zip erate.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: erate-macos.zip

  windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
      - name: Verify Visual Studio
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * `
            -requires Microsoft.VisualStudio.Workload.NativeDesktop `
            -property installationPath
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Manual CMake configure with VS 2022
        shell: pwsh
        run: |
          flutter build windows --release --verbose 2>&1 | Tee-Object -FilePath first-try.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Retry with explicit VS 2022 CMake generator..."
            Remove-Item -Recurse -Force build/windows -ErrorAction SilentlyContinue
            $flutterRoot = (flutter --version --machine | ConvertFrom-Json).flutterRoot
            $env:FLUTTER_ROOT = $flutterRoot
            cmake -S windows -B build/windows/x64 -G "Visual Studio 17 2022" -A x64 `
              -DFLUTTER_TARGET_PLATFORM=windows-x64 `
              -DCMAKE_BUILD_TYPE=Release
            cmake --build build/windows/x64 --config Release --target INSTALL
          }
      - name: Zip Windows build
        shell: pwsh
        run: |
          $dir = if (Test-Path 'build/windows/x64/runner/Release') { 'build/windows/x64/runner/Release' } else { 'build/windows/runner/Release' }
          Compress-Archive -Path "$dir/*" -DestinationPath erate-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: erate-windows.zip

  linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libglu1-mesa
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Tar Linux build
        run: tar -czf erate-linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: erate-linux.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
