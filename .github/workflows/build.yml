name: Build Multi-Platform Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.4"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/erate-release.jks"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > android/key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
      - run: flutter build apk --release --split-per-abi
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release
          zip -qry ../../../../../erate-macos.zip erate.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: erate-macos.zip

  ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Ensure iOS platform
        run: |
          [ -d ios ] || flutter create --platforms=ios --project-name erate --org io.github.mrbunker .
      - run: flutter pub get
      - run: cd ios && pod install --repo-update
      - run: flutter build ios --release --no-codesign
      - name: Package IPA
        run: |
          APP=$(find build/ios/iphoneos -maxdepth 2 -name 'Runner.app' -type d | head -n1)
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -qry erate-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: erate-ios-unsigned.ipa

  windows:
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath erate-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: erate-windows.zip

  linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libglu1-mesa
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - run: tar -czf erate-linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: erate-linux.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
